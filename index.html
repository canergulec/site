```html
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW Showroom PRO+</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    background: black;
}

/* controls */
.controls {
    text-align: center;
    padding: 10px;
}

input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

/* cards */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    width: 260px;
    margin: 10px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

.card h3 {
    text-align: center;
}

/* modal */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal-content {
    background: #222;
    margin: 8% auto;
    padding: 20px;
    width: 80%;
    max-width: 500px;
}

/* admin */
.admin {
    background: #111;
    padding: 15px;
    text-align: center;
}

/* drag drop */
.drop-area {
    border: 2px dashed #555;
    padding: 20px;
    margin: 10px;
}

.drop-area.hover {
    border-color: white;
}

.preview {
    max-width: 200px;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>BMW Showroom PRO+</header>

<div class="controls">
    <input type="text" id="search" placeholder="Araç ara...">
    <select id="filter">
        <option value="all">Tümü</option>
        <option value="Sedan">Sedan</option>
        <option value="SUV">SUV</option>
    </select>
</div>

<div class="container" id="carList"></div>

<!-- ADMIN -->
<div class="admin">
    <h3>Araç Ekle</h3>
    <input id="name" placeholder="Araç adı">
    <input id="category" placeholder="Kategori">
    <input id="specs" placeholder="Teknik özellikler">

    <div class="drop-area" id="drop">
        Görseli buraya sürükle
        <input type="file" id="fileInput">
        <img id="preview" class="preview">
    </div>

    <button onclick="addCar()">Ekle</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="mTitle"></h2>
        <img id="mImg" style="width:100%">
        <p id="mSpecs"></p>
        <button onclick="closeModal()">Kapat</button>
    </div>
</div>

<script>
let cars = JSON.parse(localStorage.getItem("cars")) || [];

let currentImage = "";

/* render */
function render() {
    let list = document.getElementById("carList");
    list.innerHTML = "";

    let search = document.getElementById("search").value.toLowerCase();
    let filter = document.getElementById("filter").value;

    cars
    .filter(c => c.name.toLowerCase().includes(search))
    .filter(c => filter === "all" || c.category === filter)
    .forEach(c => {
        list.innerHTML += `
        <div class="card" onclick="openModal('${c.name}','${c.img}','${c.specs}')">
            <img src="${c.img}">
            <h3>${c.name}</h3>
        </div>`;
    });
}

/* add car */
function addCar() {
    if (!currentImage) {
        alert("Görsel yükle!");
        return;
    }

    let car = {
        name: document.getElementById("name").value,
        category: document.getElementById("category").value,
        specs: document.getElementById("specs").value,
        img: currentImage
    };

    cars.push(car);
    localStorage.setItem("cars", JSON.stringify(cars));
    render();
}

/* modal */
function openModal(title, img, specs) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("mTitle").innerText = title;
    document.getElementById("mImg").src = img;
    document.getElementById("mSpecs").innerText = specs;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

/* drag drop */
let drop = document.getElementById("drop");

drop.addEventListener("dragover", e => {
    e.preventDefault();
    drop.classList.add("hover");
});

drop.addEventListener("dragleave", () => {
    drop.classList.remove("hover");
});

drop.addEventListener("drop", e => {
    e.preventDefault();
    drop.classList.remove("hover");

    let file = e.dataTransfer.files[0];
    handleFile(file);
});

document.getElementById("fileInput").addEventListener("change", e => {
    handleFile(e.target.files[0]);
});

function handleFile(file) {
    let reader = new FileReader();
    reader.onload = function(e) {
        currentImage = e.target.result;
        document.getElementById("preview").src = currentImage;
    }
    reader.readAsDataURL(file);
}

/* search/filter */
document.getElementById("search").oninput = render;
document.getElementById("filter").onchange = render;

render();
</script>

</body>
</html>
